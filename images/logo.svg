<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 108" role="img" aria-label="Lets Move Abroad">
  <style>
    .lma-move { fill: #fff; }
    .lma-sub  { fill: #fff; }
    .lma-lets { fill: #F4791E; }
    .lma-plane{ fill: #F4791E; }
  </style>

  <!-- swoosh trail: curves from behind the plane, loops down and around -->
  <path d="M205 30 C 248 28, 285 46, 276 68 C 270 82, 250 82, 244 70"
        fill="none" stroke="#F4791E" stroke-width="4.4" stroke-linecap="round"/>

  <!-- airplane, banking up to the right -->
  <g class="lma-plane" transform="translate(196 8) rotate(38)">
    <path d="M20 2c2.4 0 4 3.5 4 9v10l16 9c1 .6 1.6 1.7 1.6 2.9v2.3L24 40v10.5l5 3.4v3.1L20 55l-9 1.9v-3.1l5-3.4V40L-1.6 45.1v-2.3c0-1.2.6-2.3 1.6-2.9l16-9V11c0-5.5 1.6-9 4-9z"/>
  </g>

  <!-- wordmark -->
  <text x="6" y="74" font-family="'IBM Plex Sans','Segoe UI',sans-serif" font-size="62" font-weight="700" letter-spacing="-2">
    <tspan class="lma-lets">Lets</tspan><tspan class="lma-move">Move</tspan>
  </text>

  <!-- ABROAD under the 'Move' portion -->
  <text class="lma-sub" x="150" y="100" text-anchor="middle" font-family="'IBM Plex Sans','Segoe UI',sans-serif" font-size="21" font-weight="700" letter-spacing="7.5">ABROAD</text>
</svg>
